<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据后台 - Fox Spring Tea（测试站）</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    main { max-width: 1100px; }
    .test-banner {
      background-color: #fdf0e4;
      border: 1px solid #e8c79a;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      margin-bottom: 1.5rem;
      color: #8b5a2b;
      font-size: 0.9rem;
      text-align: center;
    }
    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    .card h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--accent-color);
    }
    .form-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.9rem;
      flex-wrap: wrap;
    }
    .form-row label { font-size: 0.95rem; min-width: 4em; }
    .form-row input {
      padding: 0.45rem 0.7rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    .btn {
      display: inline-block;
      padding: 0.45rem 1.2rem;
      border: none;
      border-radius: 6px;
      background-color: var(--accent-color);
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .btn:hover { background-color: var(--accent-hover); }
    .btn.secondary {
      background-color: #fff;
      color: var(--accent-color);
      border: 1px solid var(--accent-color);
    }
    .btn.secondary:hover { background-color: #f4ede2; }
    .login-error {
      color: #b3402a;
      font-size: 0.9rem;
      min-height: 1.2em;
    }
    .login-hint {
      color: var(--muted-color);
      font-size: 0.85rem;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .toolbar .left, .toolbar .right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .table-wrap { overflow-x: auto; }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    th, td {
      border: 1px solid var(--border-color);
      padding: 0.4rem 0.6rem;
      text-align: right;
    }
    th {
      background-color: #f4ede2;
      color: var(--accent-color);
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    td.text, th.text { text-align: left; }
    tbody tr:nth-child(even) { background-color: #faf8f3; }
  </style>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    // CDN 兜底：若 SheetJS 官方 CDN 不可用，改用 cdnjs 的 xlsx 0.18.5
    if (typeof XLSX === 'undefined') {
      document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>');
    }
  </script>
</head>
<body>
  <header>
    <h1>数据后台</h1>
    <p class="subtitle">Fox Spring Tea（测试站）· 模拟生意参谋数据</p>
  </header>

  <main>
    <div class="test-banner">
      ⚠️ 这是测试演示站点，页面数据均为程序生成的模拟数据，仅用于内部测试，请勿外传。
    </div>

    <!-- 登录区 -->
    <section class="card" id="login-panel">
      <h2>登录</h2>
      <form id="login-form">
        <div class="form-row">
          <label for="username">账号</label>
          <input type="text" id="username" autocomplete="username" required>
        </div>
        <div class="form-row">
          <label for="password">密码</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <div class="form-row">
          <button type="submit" class="btn" id="login-btn">登录</button>
          <span class="login-hint">演示账号：admin / fox2026（这是测试演示站点）</span>
        </div>
        <p class="login-error" id="login-error"></p>
      </form>
    </section>

    <!-- 数据区 -->
    <section class="card" id="data-panel" style="display:none;">
      <div class="toolbar">
        <div class="left">
          <label for="stat-date">统计日期</label>
          <input type="date" id="stat-date" value="2026-07-21">
          <button type="button" class="btn" id="export-btn">导出 Excel</button>
        </div>
        <div class="right">
          <span class="login-hint">已登录：admin</span>
          <button type="button" class="btn secondary" id="logout-btn">退出登录</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="data-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Fox Spring Tea · 测试演示站点</p>
  </footer>

  <!-- 共享数据生成逻辑（与 scripts/generate-api.js 共用，勿改 assets/data-gen.js 的生成算法） -->
  <script src="assets/data-gen.js"></script>
  <script>
    'use strict';

    /* ============ 登录逻辑 ============ */
    var ADMIN_USER = 'admin';
    var ADMIN_PASS = 'fox2026';
    var SESSION_KEY = 'fst_admin_logged_in';

    function isLoggedIn() {
      return sessionStorage.getItem(SESSION_KEY) === '1';
    }

    function showPanel() {
      document.getElementById('login-panel').style.display = isLoggedIn() ? 'none' : '';
      document.getElementById('data-panel').style.display = isLoggedIn() ? '' : 'none';
      if (isLoggedIn()) {
        renderTable();
      }
    }

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var u = document.getElementById('username').value.trim();
      var p = document.getElementById('password').value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.getElementById('login-error').textContent = '';
        showPanel();
      } else {
        document.getElementById('login-error').textContent = '账号或密码错误';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', function () {
      sessionStorage.removeItem(SESSION_KEY);
      showPanel();
    });

    /* 商品清单 / 表头 / hash+LCG / buildRows 已抽取到 assets/data-gen.js（浏览器与 node 共用） */

    function getDateStr() {
      var v = document.getElementById('stat-date').value;
      return v || '2026-07-21';
    }

    /* ============ 表格渲染 ============ */
    function renderTable() {
      var table = document.getElementById('data-table');
      var thead = table.querySelector('thead');
      var tbody = table.querySelector('tbody');
      thead.innerHTML = '';
      tbody.innerHTML = '';

      var hr = document.createElement('tr');
      HEADERS.forEach(function (h) {
        var th = document.createElement('th');
        th.textContent = h;
        if (TEXT_COLS[h]) { th.className = 'text'; }
        hr.appendChild(th);
      });
      thead.appendChild(hr);

      buildRows(getDateStr()).forEach(function (row) {
        var tr = document.createElement('tr');
        row.forEach(function (cell, idx) {
          var td = document.createElement('td');
          td.textContent = cell;
          if (TEXT_COLS[HEADERS[idx]]) { td.className = 'text'; }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    document.getElementById('stat-date').addEventListener('change', renderTable);

    /* ============ 导出 Excel（真二进制 .xls / biff8） ============ */
    document.getElementById('export-btn').addEventListener('click', function () {
      if (typeof XLSX === 'undefined') {
        alert('SheetJS 库加载失败，请检查网络后刷新页面重试。');
        return;
      }
      var dateStr = getDateStr();
      // aoa 结构：前 4 行空行，第 5 行表头，第 6 行起数据（与真实生意参谋导出一致）
      var aoa = [[], [], [], []];
      aoa.push(HEADERS.slice());
      buildRows(dateStr).forEach(function (row) { aoa.push(row.slice()); });

      var ws = XLSX.utils.aoa_to_sheet(aoa);
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '商品-全部');
      var out = XLSX.write(wb, { bookType: 'biff8', type: 'array' });
      var blob = new Blob([out], { type: 'application/vnd.ms-excel' });

      var fileName = '【生意参谋平台】商品_全部_' + dateStr + '_' + dateStr + '.xls';
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
    });

    /* ============ 初始化 ============ */
    showPanel();
  </script>
</body>
</html>
